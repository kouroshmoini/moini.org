media:
  input: assets/uploads
  output: /assets/uploads

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Title
        type: string

      - name: date
        label: Date
        type: date

      - name: hero_image
        label: Hero Image
        type: image

      - name: hero_alt
        label: Hero Image Alt Text
        type: string

      - name: hero_caption
        label: Hero Caption
        type: string

      - name: body
        label: Content (Markdown)
        description: Use this for standard posts.
        type: rich-text

      - name: content_blocks
        label: Content Blocks (Rich Text + Raw HTML)
        description: Use this when you need to mix rich text and rendered HTML snippets in one post.
        type: block
        required: false
        list: true
        blocks:
          - name: rich_text
            label: Rich Text
            fields:
              - name: content
                label: Content
                type: rich-text

          - name: raw_html
            label: Raw HTML
            fields:
              - name: html
                label: HTML Snippet
                type: code
                options:
                  language: html

settings:
  content:
    merge: true
