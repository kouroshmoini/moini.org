media:
  input: assets/uploads
  output: /assets/uploads

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    view:
      fields: [title, published, publish_at, date]
    fields:
      - name: title
        label: Title
        type: string

      - name: date
        label: Date
        type: date
        options:
          time: true

      - name: published
        label: Published
        description: Turn off to keep this item private. It will still be available in local preview.
        type: boolean
        default: true

      - name: publish_at
        label: Publish At
        description: Optional go-live date/time. Keep Published off until this time to schedule auto-publishing.
        type: date
        required: false
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm"

      - name: hero_image
        label: Hero Image
        type: image

      - name: hero_alt
        label: Hero Image Alt Text
        type: string

      - name: hero_caption
        label: Hero Caption
        type: string

      - name: content_blocks
        label: Content
        description: Build post content in order. Use Rich Text for normal writing and insert Raw HTML blocks wherever needed.
        type: block
        required: false
        list:
          collapsible:
            collapsed: true
            summary: "Item #{index} {fields.block_label}"
        blocks:
          - name: rich_text
            label: Rich Text
            fields:
              - name: block_label
                label: Block Name (optional)
                type: string
              - name: content
                label: Content
                type: rich-text

          - name: raw_html
            label: Raw HTML
            fields:
              - name: block_label
                label: Block Name (optional)
                type: string
              - name: html
                label: HTML Snippet
                type: code
                options:
                  language: html

  - name: home_page
    label: Home Page (HTML)
    type: file
    path: index.html
    fields:
      - name: layout
        type: string
        hidden: true
        default: default

      - name: title
        label: Title
        type: string

      - name: published
        label: Published
        description: Turn off to keep this page private. It will still be available in local preview.
        type: boolean
        default: true

      - name: publish_at
        label: Publish At
        description: Optional go-live date/time. Keep Published off until this time to schedule auto-publishing.
        type: date
        required: false
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm"

      - name: body
        label: HTML Content
        type: code
        options:
          language: html

  - name: about_page
    label: About Page (HTML)
    type: file
    path: about/index.html
    fields:
      - name: layout
        type: string
        hidden: true
        default: default

      - name: title
        label: Title
        type: string
        default: About

      - name: permalink
        type: string
        hidden: true
        default: /about/

      - name: published
        label: Published
        description: Turn off to keep this page private. It will still be available in local preview.
        type: boolean
        default: true

      - name: publish_at
        label: Publish At
        description: Optional go-live date/time. Keep Published off until this time to schedule auto-publishing.
        type: date
        required: false
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm"

      - name: body
        label: HTML Content
        type: code
        options:
          language: html

settings:
  content:
    merge: true
