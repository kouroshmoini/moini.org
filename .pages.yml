media:
  input: assets/uploads
  output: /assets/uploads

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Title
        type: string

      - name: date
        label: Date
        type: date

      - name: hero_image
        label: Hero Image
        type: image

      - name: hero_alt
        label: Hero Image Alt Text
        type: string

      - name: hero_caption
        label: Hero Caption
        type: string

      - name: content_blocks
        label: Content
        description: Build post content in order. Use Rich Text for normal writing and insert Raw HTML blocks wherever needed.
        type: block
        required: false
        list: true
        blocks:
          - name: rich_text
            label: Rich Text
            fields:
              - name: content
                label: Content
                type: rich-text

          - name: raw_html
            label: Raw HTML
            fields:
              - name: html
                label: HTML Snippet
                type: text
                options:
                  rows: 10
                  autoresize: true

settings:
  content:
    merge: true
