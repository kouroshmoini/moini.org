media:
  input: assets/uploads
  output: /assets/uploads

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: _posts
    view:
      fields: [title, published, publish_at]
    fields:
      - name: title
        label: Title
        type: string

      - name: published
        label: Publish Now
        description: Turn on to make this post public immediately.
        type: boolean
        default: false

      - name: publish_at
        label: Publish Date & Time
        description: Optional scheduled go-live. Keep Publish Now off and this will auto-publish at this time.
        type: date
        required: false
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm"

      - name: hero_image
        label: Hero Image
        type: image

      - name: hero_alt
        label: Hero Image Alt Text
        type: string

      - name: hero_caption
        label: Hero Caption
        type: string

      - name: seo_title
        label: SEO Title
        type: string
        required: false

      - name: seo_description
        label: SEO Description
        type: text
        required: false

      - name: og_image
        label: Social Preview Image
        type: image
        required: false

      - name: noindex
        label: Hide From Search Engines
        type: boolean
        default: false

      - name: content_blocks
        label: Content
        description: Build post content in order. Use Rich Text for normal writing and insert Raw HTML blocks wherever needed.
        type: block
        required: false
        list:
          collapsible:
            collapsed: true
            summary: "Item #{index} {fields.block_label}"
        blocks:
          - name: rich_text
            label: Rich Text
            fields:
              - name: block_label
                label: Block Name (optional)
                type: string
              - name: content
                label: Content
                type: rich-text

          - name: raw_html
            label: Raw HTML
            fields:
              - name: block_label
                label: Block Name (optional)
                type: string
              - name: html
                label: HTML Snippet
                type: code
                options:
                  language: html

  - name: home_page
    label: Home Page (HTML)
    type: file
    path: index.html
    fields:
      - name: layout
        type: string
        hidden: true
        default: default

      - name: title
        label: Title
        type: string

      - name: seo_title
        label: SEO Title
        type: string
        required: false

      - name: seo_description
        label: SEO Description
        type: text
        required: false

      - name: og_image
        label: Social Preview Image
        type: image
        required: false

      - name: noindex
        label: Hide From Search Engines
        type: boolean
        default: false

      - name: published
        label: Publish Now
        description: Turn on to make this page public immediately.
        type: boolean
        default: true

      - name: publish_at
        label: Publish Date & Time
        description: Optional scheduled go-live. Keep Publish Now off and this will auto-publish at this time.
        type: date
        required: false
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm"

      - name: body
        label: HTML Content
        type: code
        options:
          language: html

  - name: about_page
    label: About Page (HTML)
    type: file
    path: about/index.html
    fields:
      - name: layout
        type: string
        hidden: true
        default: default

      - name: title
        label: Title
        type: string
        default: About

      - name: seo_title
        label: SEO Title
        type: string
        required: false

      - name: seo_description
        label: SEO Description
        type: text
        required: false

      - name: og_image
        label: Social Preview Image
        type: image
        required: false

      - name: noindex
        label: Hide From Search Engines
        type: boolean
        default: false

      - name: permalink
        type: string
        hidden: true
        default: /about/

      - name: published
        label: Publish Now
        description: Turn on to make this page public immediately.
        type: boolean
        default: true

      - name: publish_at
        label: Publish Date & Time
        description: Optional scheduled go-live. Keep Publish Now off and this will auto-publish at this time.
        type: date
        required: false
        options:
          time: true
          format: "yyyy-MM-dd'T'HH:mm"

      - name: body
        label: HTML Content
        type: code
        options:
          language: html

settings:
  content:
    merge: true
