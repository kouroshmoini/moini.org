name: Auto Post Redirects

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  redirect-post-urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Create redirects for changed post URLs
        env:
          REDIRECT_DIFF_RANGE: ${{ github.event.before }}..${{ github.sha }}
        run: ruby scripts/auto_add_post_redirects.rb

      - name: Commit and push redirect files
        run: |
          if [[ -z "$(git status --porcelain _redirects)" ]]; then
            echo "No redirect changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _redirects
          git commit -m "Add automatic redirects for changed post URLs"
          git push
