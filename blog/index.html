---
layout: default
title: Blog
permalink: /blog/
---

<div class="archive">
  <h1 class="archive-title">Blog</h1>

  <div class="postgrid bloggrid">
    {% for post in site.posts %}
      {% assign thumb = post.hero_image | default: post.image | default: post.cover %}
      <a class="postcard" href="{{ post.url | relative_url }}">
        {% if thumb %}
          <div class="postthumb">
            <img src="{{ thumb | relative_url }}" alt="{{ post.title | escape }}" loading="lazy">
          </div>
        {% endif %}
        <div class="postcard-body">
          <div class="posttitle">{{ post.title }}</div>
          <div class="postreadmore">Click to read more →</div>
        </div>
      </a>
    {% endfor %}
  </div>
</div>
